<!-- --- Component: login.html --- -->
<div class="container-fluid login-container">
    <div class="row align-items-stretch w-100 h-100">
        
        <!-- Left Column: Login Form -->
        <div class="col-lg-5 col-12 d-flex align-items-center py-4">
            <div class="login-form-wrapper">
                <!-- Brand Logo -->
                <a href="home.html" class="login-logo">
                    <img src="assets/img/svgs/storyblok-logotype.svg" alt="Storyblok" style="width: 120px; height: auto;">
                </a>
                
                <!-- Titles -->
                <h1>Welcome back</h1>
                <h2>Login to Storyblok</h2>
                
                <!-- GitHub Button -->
                <button class="btn btn-github" type="button">
                    <i class="bi bi-github"></i> Login with GitHub
                </button>
                
                <!-- Divider -->
                <div class="login-divider">Or Continue With Your Email</div>
                
                <!-- Email Form -->
                <form action="#" method="POST" id="loginForm">
                    <div class="mb-4">
                        <label for="emailInput" class="form-label">Email</label>
                        <div class="form-control-wrapper">
                            <input type="email" id="emailInput" placeholder="Enter your email" required autocomplete="email">
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label for="passwordInput" class="form-label">Password</label>
                        <a href="#" class="forgot-password-link">Forgot password?</a>
                        <div class="form-control-wrapper">
                            <input type="password" id="passwordInput" placeholder="Enter your password" required autocomplete="current-password">
                            <button type="button" class="password-toggle-btn" id="passwordToggleBtn" aria-label="Toggle Password Visibility">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>
                    
                    <!-- Login Button -->
                    <button type="submit" class="btn btn-teal">Login</button>
                </form>
                
                <!-- Footer Links -->
                <div class="login-bottom-text mt-4">
                    Don't have an account? <a href="signup.html">Sign up</a>
                </div>
                <div>
                    <a href="#" class="resend-link">Resend confirmation email</a>
                </div>
            </div>
        </div>
        
        <!-- Right Column: Concept Room Illustration -->
        <div class="col-lg-7 col-12 d-lg-block d-none py-4">
            <div class="concept-panel">
                <!-- Illustration Image -->
                <div class="concept-image-wrapper">
                    <img src="assets/img/concept-room.png" alt="Storyblok Concept Room digital whiteboard workflow illustration" class="img-fluid">
                </div>
                
                <!-- Details -->
                <h3>Concept Room</h3>
                <p>The Concept Room is your digital whiteboard. Sketch, test, and perfect your website structures—all before they hit the spotlight.</p>
                
                <!-- Pagination Indicators -->
                <div class="concept-pagination">
                    <span>&lt;</span>
                    <span class="active">1</span>
                    <span>2</span>
                    <span>3</span>
                    <span>4</span>
                    <span>&gt;</span>
                </div>
                
                <!-- Logos -->
                <div class="concept-logos">
                    <img src="assets/img/svgs/tomtom.svg" alt="TomTom">
                    <img src="assets/img/svgs/netflix-logo.svg" alt="Netflix">
                    <img src="assets/img/svgs/oatly-logo.svg" alt="Oatly">
                    <img src="assets/img/svgs/marcopolo-logo.svg" alt="Marc O'Polo">
                    <img src="assets/img/svgs/adidas.svg" alt="Adidas">
                </div>
            </div>
        </div>
        
    </div>
</div>
